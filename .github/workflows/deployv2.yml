name: Build and Deploy Python Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "templates/**"
      - "images/**"
      - "*.py"
      - "*.json"
      - "requirements.txt"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Generation Scripts
        run: |
          python generate_blogs.py
          python build.py

      - name: Prepare Public Folder
        run: |
          rm -rf public
          mkdir -p public

          cp -r blogs public/
          cp -r images public/
          cp *.html public/

          touch public/.nojekyll

      - name: Inspect Published Files
        run: |
          echo "Files being deployed:"
          find public -maxdepth 2 -type f | sort

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
