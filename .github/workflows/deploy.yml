name: Build and Deploy Python Site
on:
  workflow_dispatch:          # Manual "Run workflow" button
  schedule:
    - cron: '27 13 */2 * *'       # Runs every day at 08:00 UTC (we can change this per site)
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install -r requirements.txt
        
      - name: Run Generation Scripts
        run: |
          python generate_blogs.py
          python build.py
          
- name: Prepare Public Folder
  run: |
    rm -rf public
    mkdir -p public

    cp -r blogs public/
    cp -r images public/

    cp *.html public/          
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/
